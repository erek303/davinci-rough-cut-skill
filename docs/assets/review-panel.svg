<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">DaVinci Rough Cut browser review panel</title>
  <desc id="desc">A browser panel showing transcript segments, original text, AI keep suggestions, manual keep and delete decisions, and export controls for a DaVinci rough cut.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f4ee"/>
      <stop offset="0.52" stop-color="#eef5f4"/>
      <stop offset="1" stop-color="#f5f0f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#22313f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="68" y="52" width="1144" height="656" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="68" y="52" width="1144" height="64" rx="18" fill="#25313b"/>
  <rect x="68" y="96" width="1144" height="20" fill="#25313b"/>
  <circle cx="106" cy="84" r="9" fill="#ff6b5f"/>
  <circle cx="136" cy="84" r="9" fill="#f8c24e"/>
  <circle cx="166" cy="84" r="9" fill="#58c66b"/>
  <text x="212" y="91" font-family="Inter, Arial, sans-serif" font-size="18" fill="#f7f9fb" font-weight="700">DaVinci Rough Cut Review</text>
  <rect x="908" y="70" width="126" height="28" rx="6" fill="#dceef2"/>
  <text x="934" y="90" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1c4f59" font-weight="700">Save review</text>
  <rect x="1050" y="70" width="126" height="28" rx="6" fill="#ffe2b8"/>
  <text x="1075" y="90" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6a4314" font-weight="700">Export XML</text>

  <rect x="92" y="140" width="250" height="540" rx="10" fill="#f6f8f8" stroke="#d9e0e2"/>
  <text x="116" y="176" font-family="Inter, Arial, sans-serif" font-size="14" fill="#62717a" font-weight="700">TIMELINE</text>
  <text x="116" y="206" font-family="Inter, Arial, sans-serif" font-size="28" fill="#1f2931" font-weight="800">42 clips</text>
  <text x="116" y="233" font-family="Inter, Arial, sans-serif" font-size="14" fill="#667781">18 keep / 24 trim</text>
  <rect x="116" y="268" width="184" height="10" rx="5" fill="#dce4e6"/>
  <rect x="116" y="268" width="94" height="10" rx="5" fill="#3f8f7b"/>
  <rect x="116" y="308" width="184" height="42" rx="8" fill="#ffffff" stroke="#dce3e5"/>
  <text x="132" y="333" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f2931">00:02:14 Hook</text>
  <rect x="116" y="362" width="184" height="42" rx="8" fill="#eaf7f1" stroke="#b7dfc9"/>
  <text x="132" y="387" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1f4939">00:05:48 Keep</text>
  <rect x="116" y="416" width="184" height="42" rx="8" fill="#fff3e5" stroke="#edd2ac"/>
  <text x="132" y="441" font-family="Inter, Arial, sans-serif" font-size="13" fill="#684716">00:09:31 Rewrite</text>
  <rect x="116" y="470" width="184" height="42" rx="8" fill="#f7eeee" stroke="#e5c8c8"/>
  <text x="132" y="495" font-family="Inter, Arial, sans-serif" font-size="13" fill="#743535">00:12:08 Delete</text>

  <rect x="372" y="140" width="790" height="92" rx="10" fill="#f8fafb" stroke="#d9e0e2"/>
  <text x="396" y="174" font-family="Inter, Arial, sans-serif" font-size="13" fill="#71808a" font-weight="700">PROJECT CONTEXT</text>
  <text x="396" y="204" font-family="Inter, Arial, sans-serif" font-size="22" fill="#1f2931" font-weight="800">Transcript-guided rough cut from original material</text>

  <rect x="372" y="256" width="790" height="118" rx="10" fill="#ffffff" stroke="#d9e0e2"/>
  <rect x="396" y="282" width="76" height="24" rx="12" fill="#eaf7f1"/>
  <text x="416" y="299" font-family="Inter, Arial, sans-serif" font-size="12" fill="#246149" font-weight="700">KEEP</text>
  <text x="492" y="299" font-family="Inter, Arial, sans-serif" font-size="13" fill="#71808a">00:05:48 - 00:06:22</text>
  <text x="396" y="332" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1f2931" font-weight="700">Original transcript</text>
  <text x="396" y="358" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4b5a64">The important thing is not the tool itself, but how it changes the editing path.</text>

  <rect x="372" y="394" width="790" height="128" rx="10" fill="#fbfcfd" stroke="#d9e0e2"/>
  <text x="396" y="430" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1f2931" font-weight="700">AI optimized draft</text>
  <text x="396" y="458" font-family="Inter, Arial, sans-serif" font-size="15" fill="#4b5a64">The tool matters only when it shortens the path from raw material to a usable story.</text>
  <rect x="396" y="482" width="132" height="28" rx="6" fill="#25313b"/>
  <text x="420" y="501" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="700">Use optimized</text>
  <rect x="540" y="482" width="118" height="28" rx="6" fill="#eef1f2"/>
  <text x="564" y="501" font-family="Inter, Arial, sans-serif" font-size="12" fill="#47545c" font-weight="700">Keep original</text>

  <rect x="372" y="548" width="790" height="86" rx="10" fill="#fff8eb" stroke="#efd7ad"/>
  <text x="396" y="582" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6a4314" font-weight="800">Export result</text>
  <text x="396" y="612" font-family="Inter, Arial, sans-serif" font-size="15" fill="#624d2c">Reviewed selections become a Resolve-importable FCP7 XML rough-cut timeline.</text>
</svg>
